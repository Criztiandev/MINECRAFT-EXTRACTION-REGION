# ExtractionChest Configuration
# Plugin version: ${project.version}

# General settings
settings:
  debug: false
  bypass_cooldown: false # If true, players can bypass extraction cooldowns (useful for testing)
  prefix: "&8[&bExtractionChest&8]&r"

# Region settings
region:
  always-show-regions: false
  replenish-batch-size: 5
  timezone: "Asia/Manila"   # Java ZoneId — used for cron replenish timing
  replenish-announcement:
    enabled: true
    # Sent to all players when a region replenishes
    message: "&8[&a!&8] &aThe extraction region &b%region% &ahas been replenished!"
    # Sound played on replenish (Bukkit Sound name). Leave empty for no sound.
    sound: "ENTITY_ENDER_DRAGON_GROWL"
    sound-volume: 1.0
    sound-pitch: 1.5
    # Timed warnings before replenish (minutes before). Leave empty to disable.
    pre-announce-minutes:
      - 10
      - 5
      - 1
    # Message for pre-announce warnings. %region% and %minutes% are placeholders.
    pre-announce-message: "&8[&e!&8] &eThe extraction region &b%region% &ewill replenish in &f%minutes% minute(s)&e!"
    # Sound played on pre-announce warnings.
    pre-announce-sound: "BLOCK_NOTE_BLOCK_PLING"
    pre-announce-sound-volume: 1.0
    pre-announce-sound-pitch: 2.0

# Extraction Settings
extraction:
  force_op_commands: true # If true, region commands will run with temporary OP permissions without needing [CONSOLE] prefix.
  announcement:
    radius: 100
    start_actionbar: "&cExtraction %region% | %x%, %y%, %z%"
    start_chat: "&e[!] Extraction started at &b%region%&e! &7(%x%, %y%, %z%)"
    end_chat: "&eExtraction &b%region% &efinished! &7(Cap: &b%capacity%&7, Cooldown: &b%cooldown%m&7)"
  messages:
    start: "&8[&c!&8] &e⚠️ &aAn extraction has been initiated! &eStand by..."
    start_title:
      title: "&c&lKeep looking at the button!!"
      fade_in: 10
      stay: 60
      fade_out: 10
    extracting_actionbar: "&a%player% is extracting us!"
    success: "&aExtraction successful!"
    success_title:
      title: "&a&lEXTRACTED!"
      subtitle: "&7You have been successfully extracted."
      fade_in: 10
      stay: 70
      fade_out: 20
    cancelled_look: "&cExtraction cancelled: Looked away from conduit!"
    cancelled_move: "&cExtraction cancelled: You moved!"
    cancelled_combat: "&cExtraction cancelled by combat!"
    countdown_actionbar: "&aExtracting in %time%s... &7(Keep looking & don't move)"
    departed: "&8[&c!&8] &cExtraction point &b%region% &chas departed!"
    mimic_trap: "&8[&c!&8] &cThe extraction point at &b%region% &cwas a Mimic Trap!"
  effects:
    alarm_enabled: true
    alarm_sound: "BLOCK_BELL_RESONATE" # Options: BLOCK_BELL_RESONATE, ENTITY_GHAST_WARN, ENTITY_GUARDIAN_ATTACK
    alarm_volume: 3.0
    alarm_pitch: 2.0
    beam_color: "#FF0000" # Hex color for the extraction beam
  fireworks:
    # Use hex color codes
    colors:
      - "#FFFF00" # YELLOW
      - "#FFA500" # ORANGE
      - "#FF0000" # RED
    fade: "#FFFFFF" # WHITE
  mimic:
    # Should the trap explode when triggered?
    explode: true
    explosion_power: 4.0
    # Guard mob settings
    mob_type: "ZOMBIE"
    custom_name: "&cMimic Guard"
    equipment:
      helmet: "IRON_HELMET"
      chestplate: "IRON_CHESTPLATE"
      leggings: "IRON_LEGGINGS"
      boots: "IRON_BOOTS"
      main_hand: "IRON_SWORD"
      off_hand: "SHIELD"
    # How many guards to spawn?
    spawn_count: 2
